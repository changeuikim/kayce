name: '✨ 기능 추가'
description: '프로젝트에 새로운 기능을 추가합니다.'
title: '[feat] '
labels:
  - 'enhancement'

body:
  - type: markdown
    attributes:
      value: |
        ### 기능 설명

  - type: textarea
    id: feature_description
    attributes:
      label: 기능 설명
      description: 추가할 기능에 대한 설명을 입력하세요.
      placeholder: 예) 블로그에서 카테고리 별로 포스트를 조회할 수 있습니다.
    validations:
      required: true

  - type: textarea
    id: feature_necessity
    attributes:
      label: 필요성
      description: 이 기능이 왜 필요한지 설명하세요.
      placeholder: 예) 많은 포스트를 체계적으로 관리할 때 도움이 됩니다.
    validations:
      required: true

  - type: textarea
    id: feature_details
    attributes:
      label: 구현 세부 사항
      description: 기능 구현에 필요한 세부 사항을 설명하세요.
      placeholder: |
        예) 카테고리 별로 경로를 추출할 수 있도록 디렉토리 구조를 조정합니다.

  - type: textarea
    id: reference_material
    attributes:
      label: 참고 자료
      description: 관련 문서나 레퍼런스 링크를 추가해주세요.
      placeholder: 예) https://nextjs.org/docs/app/building-your-application/routing/dynamic-routes

  - type: textarea
    id: additional_info
    attributes:
      label: 추가 정보
      description: 추가로 필요한 정보가 있다면 적어주세요.
      placeholder: 예) 태그 별로 포스트를 조회하는 기능도 필요합니다.
